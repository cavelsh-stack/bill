<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Well Design Management System V19.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .modal-active { overflow: hidden; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-20">

    <nav class="sticky top-0 z-50 bg-slate-900 text-white border-b border-slate-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xl">📊</span>
                <span class="font-black text-lg tracking-tighter uppercase text-blue-400">웰디자인 <span class="text-white">통합 관리</span></span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="openQuoteModal()" id="quoteOpenBtn" class="hidden flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl transition-all">
                    <span class="text-sm font-bold">📄 견적서 시스템</span>
                </button>
                <div id="authGroup" class="flex items-center gap-2 bg-slate-800 p-1.5 rounded-xl border border-slate-700">
                    <input type="password" id="mainPwInput" placeholder="Passcode" class="bg-transparent px-3 py-1 w-24 text-center outline-none font-bold text-sm text-white">
                    <button onclick="toggleAuth()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-lg font-bold text-sm transition-all">접속</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <h2 class="text-3xl font-black text-slate-800 mb-4">회계 요약</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="p-4 bg-slate-50 rounded-2xl"><p class="text-[10px] text-slate-400 font-bold mb-1">🚨 미납 잔액</p><p id="total-unpaid" class="text-lg font-black text-rose-600">0원</p></div>
                <div class="p-4 bg-blue-600 rounded-2xl text-white"><p class="text-[10px] text-blue-100 font-bold mb-1">💰 연간 총순익</p><p id="total-profit" class="text-lg font-black">0원</p></div>
            </div>
        </div>
    </main>

    <div id="quoteModal" class="fixed inset-0 z-[100] hidden bg-slate-900/70 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">📄 견적서 통합 시스템 (PDF 지원)</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Quotation & Database Manager V19.0</p>
                </div>
                <button onclick="closeQuoteModal()" class="text-slate-400 hover:text-slate-600 text-3xl font-light">&times;</button>
            </div>
            
            <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
                <div class="w-full md:w-1/3 bg-slate-50 border-r p-6 overflow-y-auto custom-scroll">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-black text-slate-600 text-sm">저장된 견적 리스트</h3>
                        <button onclick="loadQuotations()" class="text-blue-500 text-xs font-bold">🔄 새로고침</button>
                    </div>
                    <div id="quoteHistoryList" class="space-y-3">
                        </div>
                </div>

                <div class="w-full md:w-2/3 p-6 overflow-y-auto custom-scroll space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase">견적 명칭 (저장용)</label>
                            <input type="text" id="quoteTitle" placeholder="예: 거실 인테리어 견적" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-blue-500 font-bold">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase">고객/업체명</label>
                            <input type="text" id="quoteCustomer" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase">견적 날짜</label>
                            <input type="date" id="quoteDate" class="w-full border-2 border-slate-100 p-3 rounded-xl outline-none">
                        </div>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 grid grid-cols-12 gap-3 items-end">
                        <div class="col-span-6 space-y-1">
                            <label class="text-[10px] font-black text-blue-500 uppercase">품명 및 사양</label>
                            <input type="text" id="tempItem" class="w-full border-2 border-white p-2.5 rounded-lg outline-none text-sm font-bold">
                        </div>
                        <div class="col-span-2 space-y-1">
                            <label class="text-[10px] font-black text-blue-500 uppercase">수량</label>
                            <input type="number" id="tempQty" value="1" class="w-full border-2 border-white p-2.5 rounded-lg outline-none text-center font-bold">
                        </div>
                        <div class="col-span-3 space-y-1">
                            <label class="text-[10px] font-black text-blue-500 uppercase">단가</label>
                            <input type="text" id="tempPrice" oninput="formatCurrency(this)" class="w-full border-2 border-white p-2.5 rounded-lg outline-none text-right font-bold">
                        </div>
                        <div class="col-span-1">
                            <button onclick="addPartRow()" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-black hover:bg-blue-700">＋</button>
                        </div>
                    </div>

                    <div class="overflow-hidden border rounded-2xl">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                <tr><th class="p-3 text-left">품명</th><th class="p-3 text-center w-20">수량</th><th class="p-3 text-right">단가</th><th class="p-3 text-right">소계</th><th class="p-3 text-center w-16">관리</th></tr>
                            </thead>
                            <tbody id="quoteListBody" class="divide-y divide-slate-50"></tbody>
                            <tfoot>
                                <tr class="bg-slate-900 text-white font-black">
                                    <td colspan="3" class="p-4 text-right">합계 (VAT 별도)</td>
                                    <td id="quoteGrandTotal" class="p-4 text-right text-yellow-400 text-lg">0원</td>
                                    <td></td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t bg-slate-50 flex gap-3">
                <button onclick="saveQuotation()" class="flex-1 bg-slate-900 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-black transition-all">견적서 저장/수정</button>
                <button onclick="resetQuoteForm()" class="px-8 bg-slate-200 text-slate-600 p-4 rounded-2xl font-bold hover:bg-slate-300">새로 작성</button>
            </div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // FIREBASE 초기화 (사용자 정보 기반)
        // ----------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyDj1NuIhzszfuR6F-uNxf7mmiBIMdmdPRo",
            authDomain: "cavelsh-97a49.firebaseapp.com",
            projectId: "cavelsh-97a49",
            storageBucket: "cavelsh-97a49.firebasestorage.app",
            messagingSenderId: "427204872944",
            appId: "1:427204872944:web:e378535fd5bbf12dae1035"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let quoteParts = [];
        let editingQuoteId = null;
        let isAuthenticated = false;

        // ----------------------------------------------------
        // 인증 및 메뉴 제어
        // ----------------------------------------------------
        function toggleAuth() {
            if (document.getElementById('mainPwInput').value === "0927") {
                isAuthenticated = true;
                document.getElementById('authGroup').classList.add('hidden');
                document.getElementById('quoteOpenBtn').classList.remove('hidden');
                loadQuotations();
            } else { alert("비밀번호 오류"); }
        }

        // ----------------------------------------------------
        // 견적서 시스템 로직
        // ----------------------------------------------------
        function openQuoteModal() { 
            document.getElementById('quoteModal').classList.remove('hidden'); 
            document.getElementById('quoteDate').value = new Date().toISOString().substring(0, 10);
            loadQuotations();
        }
        function closeQuoteModal() { document.getElementById('quoteModal').classList.add('hidden'); }

        function formatCurrency(input) {
            let value = input.value.replace(/[^0-9]/g, "");
            input.value = value ? Number(value).toLocaleString() : "";
        }

        function addPartRow() {
            const item = document.getElementById('tempItem').value;
            const qty = parseInt(document.getElementById('tempQty').value) || 0;
            const price = Number(document.getElementById('tempPrice').value.replace(/,/g, "")) || 0;

            if(!item) return;
            quoteParts.push({ id: Date.now(), item, qty, price, subtotal: qty * price });
            document.getElementById('tempItem').value = "";
            document.getElementById('tempPrice').value = "";
            renderQuoteParts();
        }

        function removePartRow(id) {
            quoteParts = quoteParts.filter(p => p.id !== id);
            renderQuoteParts();
        }

        function renderQuoteParts() {
            const body = document.getElementById('quoteListBody');
            let total = 0;
            body.innerHTML = "";
            quoteParts.forEach(p => {
                total += p.subtotal;
                body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-3 font-bold text-slate-700">${p.item}</td>
                        <td class="p-3 text-center font-bold text-slate-500">${p.qty}</td>
                        <td class="p-3 text-right text-slate-600">${p.price.toLocaleString()}</td>
                        <td class="p-3 text-right font-black text-blue-600">${p.subtotal.toLocaleString()}</td>
                        <td class="p-3 text-center"><button onclick="removePartRow(${p.id})" class="text-rose-400 hover:text-rose-600">✕</button></td>
                    </tr>`;
            });
            document.getElementById('quoteGrandTotal').innerText = total.toLocaleString() + "원";
        }

        // 견적서 저장 (Create/Update)
        async function saveQuotation() {
            const title = document.getElementById('quoteTitle').value;
            if(!title || quoteParts.length === 0) { alert("견적 명칭과 품목을 확인하세요."); return; }

            const data = {
                title,
                customer: document.getElementById('quoteCustomer').value,
                date: document.getElementById('quoteDate').value,
                items: quoteParts,
                totalAmount: quoteParts.reduce((s, p) => s + p.subtotal, 0),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if(editingQuoteId) {
                    await db.collection("quotations").doc(editingQuoteId).update(data);
                    alert("수정되었습니다.");
                } else {
                    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection("quotations").add(data);
                    alert("저장되었습니다.");
                }
                loadQuotations();
            } catch(e) { alert("저장 실패"); }
        }

        // 저장된 견적서 리스트 불러오기
        async function loadQuotations() {
            const snap = await db.collection("quotations").orderBy("updatedAt", "desc").get();
            const container = document.getElementById('quoteHistoryList');
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm hover:border-blue-400 transition-all">
                        <div class="mb-2">
                            <p class="text-xs font-black text-blue-500 uppercase tracking-widest">${d.date}</p>
                            <h4 class="font-bold text-slate-800 truncate">${d.title}</h4>
                            <p class="text-[11px] text-slate-400">${d.customer || '미지정 고객'}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="loadToEditor('${doc.id}')" class="flex-1 bg-slate-800 text-white text-[10px] py-1.5 rounded-lg font-bold">수정</button>
                            <button onclick="printPDF('${doc.id}')" class="flex-1 bg-blue-600 text-white text-[10px] py-1.5 rounded-lg font-bold">PDF</button>
                            <button onclick="deleteQuote('${doc.id}')" class="bg-rose-50 text-rose-500 text-[10px] px-2 py-1.5 rounded-lg font-bold">삭제</button>
                        </div>
                    </div>`;
            });
        }

        async function loadToEditor(id) {
            const doc = await db.collection("quotations").doc(id).get();
            const d = doc.data();
            editingQuoteId = id;
            document.getElementById('quoteTitle').value = d.title;
            document.getElementById('quoteCustomer').value = d.customer;
            document.getElementById('quoteDate').value = d.date;
            quoteParts = d.items;
            renderQuoteParts();
        }

        async function deleteQuote(id) {
            if(confirm("이 견적 자료를 완전히 삭제할까요?")) {
                await db.collection("quotations").doc(id).delete();
                loadQuotations();
            }
        }

        function resetQuoteForm() {
            editingQuoteId = null;
            document.getElementById('quoteTitle').value = "";
            document.getElementById('quoteCustomer').value = "";
            quoteParts = [];
            renderQuoteParts();
        }

        // ----------------------------------------------------
        // PDF 출력 엔진 (요청하신 양식 적용)
        // ----------------------------------------------------
        async function printPDF(id) {
            const docRef = await db.collection("quotations").doc(id).get();
            const d = docRef.data();
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            // 한글 폰트 우회를 위해 영문/기호 기반 레이아웃 (한글 폰트 필요 시 별도 설정 필요)
            // 여기서는 기본 구조를 잡습니다.
            
            pdf.setFontSize(22);
            pdf.text("QUOTATION", 105, 20, { align: "center" });

            pdf.setFontSize(10);
            // 좌측 고객 정보
            pdf.text(`Customer: ${d.customer || '-'}`, 20, 40);
            
            // 우측 공급자 정보 (웰디자인)
            const rightX = 140;
            pdf.text(`Date: ${d.date}`, rightX, 40);
            pdf.text("Well Design", rightX, 45);
            pdf.text("370-10, Maseok-uri, Namyangju-si", rightX, 50);
            pdf.text("Manager: Lee Sang-ho", rightX, 55);
            pdf.text("Mobile: 010-9590-9782", rightX, 60);
            pdf.text("Fax: 02-555-6575", rightX, 65);

            // 테이블 데이터 구성
            const body = d.items.map(i => [i.item, i.qty, i.price.toLocaleString(), i.subtotal.toLocaleString()]);
            
            pdf.autoTable({
                startY: 75,
                head: [['Description', 'Qty', 'Unit Price', 'Amount']],
                body: body,
                theme: 'striped',
                headStyles: { fillColor: [15, 23, 42] }
            });

            const finalY = pdf.lastAutoTable.finalY + 10;
            pdf.setFontSize(12);
            pdf.text(`Total Amount: ${d.totalAmount.toLocaleString()} KRW`, 140, finalY);
            pdf.setFontSize(8);
            pdf.text("(VAT excluded)", 140, finalY + 5);

            pdf.save(`Quotation_${d.title}.pdf`);
        }

    </script>
</body>
</html>
